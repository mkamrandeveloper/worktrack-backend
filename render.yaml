services:
  - type: web
    name: worktrack-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: worktrack-db
          property: connectionString

  - type: psql
    name: worktrack-db
    plan: free
